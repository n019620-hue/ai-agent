<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Agent</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

#sidebar{
width:220px;
background:#020617;
padding:15px;
}

#newChat{
width:100%;
padding:10px;
background:#2563eb;
border:none;
color:white;
cursor:pointer;
margin-bottom:15px;
}

#drop{
border:2px dashed #475569;
padding:10px;
text-align:center;
border-radius:8px;
font-size:13px;
}

/* MAIN */

#main{
flex:1;
display:flex;
flex-direction:column;
}

/* CONTENT */

#content{
display:flex;
flex:1;
}

/* CHAT */

#chatArea{
flex:3;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

/* REASON PANEL */

#reasonPanel{
flex:1;
background:#020617;
border-left:1px solid #1e293b;
padding:15px;
}

#reason{
font-size:13px;
opacity:.8;
}

/* MESSAGE */

.message{
display:flex;
gap:10px;
max-width:70%;
}

.user{
align-self:flex-end;
flex-direction:row-reverse;
}

.bubble{
padding:12px;
border-radius:10px;
line-height:1.5;
}

.user .bubble{
background:#2563eb;
}

.ai .bubble{
background:#1e293b;
}

/* AVATAR */

.avatar{
width:32px;
height:32px;
background:#334155;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
}

/* INPUT */

#inputArea{
display:flex;
padding:10px;
background:#020617;
}

#msg{
flex:1;
padding:12px;
background:#0f172a;
border:none;
color:white;
border-radius:6px;
}

button{
margin-left:10px;
padding:10px 18px;
background:#2563eb;
border:none;
color:white;
cursor:pointer;
border-radius:6px;
}

/* THINKING DOTS */

.typing{
display:flex;
gap:4px;
}

.dot{
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:blink 1.4s infinite;
}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes blink{
0%{opacity:.2}
20%{opacity:1}
100%{opacity:.2}
}

/* MOBILE */

@media(max-width:700px){

#sidebar{
display:none;
}

#reasonPanel{
display:none;
}

.message{
max-width:90%;
}

}

</style>

</head>

<body>

<div id="sidebar">

<button id="newChat">+ New Chat</button>

<div id="drop">
Drag & Drop File
</div>

</div>

<div id="main">

<div id="content">

<div id="chatArea">
<div id="chat"></div>
</div>

<div id="reasonPanel">

<h3>AI Reasoning</h3>

<div id="reason">
Waiting for question...
</div>

</div>

</div>

<div id="inputArea">

<input id="msg" placeholder="Ask something...">

<button onclick="send()">Send</button>

</div>

</div>

<script>

/* ADD MESSAGE */

function addMessage(text,type){

let row=document.createElement("div")
row.className="message "+type

let avatar=document.createElement("div")
avatar.className="avatar"

avatar.innerText = type==="user" ? "U" : "AI"

let bubble=document.createElement("div")
bubble.className="bubble"

bubble.innerHTML=text

row.appendChild(avatar)
row.appendChild(bubble)

document.getElementById("chat").appendChild(row)

document.getElementById("chat").scrollTop =
document.getElementById("chat").scrollHeight

}

/* SEND */

function send(){

let msg=document.getElementById("msg").value

if(msg.trim()=="") return

addMessage(msg,"user")

document.getElementById("reason").innerHTML = `
1️⃣ Reading question
<br>2️⃣ Searching information
<br>3️⃣ Generating answer
`

let thinking=document.createElement("div")
thinking.className="message ai"
thinking.id="thinking"

thinking.innerHTML=`
<div class="avatar">AI</div>
<div class="bubble">
<div class="typing">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
</div>
`

document.getElementById("chat").appendChild(thinking)

fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:msg})
})
.then(r=>r.json())
.then(data=>{

document.getElementById("thinking").remove()

addMessage(data.reply,"ai")

document.getElementById("reason").innerHTML = `
✅ Analysis complete
<br>✅ Answer generated
`

})

document.getElementById("msg").value=""

}

/* ENTER SEND */

document.getElementById("msg")
.addEventListener("keypress",function(e){

if(e.key==="Enter") send()

})

/* DRAG DROP */

let drop=document.getElementById("drop")

drop.ondragover=e=>{
e.preventDefault()
}

drop.ondrop=e=>{

e.preventDefault()

let file=e.dataTransfer.files[0]

let form=new FormData()

form.append("file",file)

addMessage("Uploading file...","user")

fetch("/upload",{
method:"POST",
body:form
})
.then(r=>r.json())
.then(data=>{

addMessage(data.reply,"ai")

})

}

</script>

</body>
</html>
